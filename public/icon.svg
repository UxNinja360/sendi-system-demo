<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#9fe870"/>
  <g transform="translate(256, 256)">
    <!-- Truck -->
    <rect x="-120" y="-50" width="160" height="80" rx="8" fill="#0d0d12"/>
    <rect x="20" y="-30" width="60" height="60" rx="8" fill="#0d0d12"/>
    
    <!-- Wheels -->
    <circle cx="-70" cy="40" r="20" fill="#262626"/>
    <circle cx="-70" cy="40" r="12" fill="#666d80"/>
    <circle cx="30" cy="40" r="20" fill="#262626"/>
    <circle cx="30" cy="40" r="12" fill="#666d80"/>
    
    <!-- Package -->
    <rect x="-90" y="-30" width="40" height="40" rx="4" fill="#262626"/>
    <line x1="-70" y1="-30" x2="-70" y2="10" stroke="#9fe870" stroke-width="4"/>
    <line x1="-90" y1="-10" x2="-50" y2="-10" stroke="#9fe870" stroke-width="4"/>
  </g>
</svg>